<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Burn Score Graph</title>
<link rel="stylesheet" href="graph.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="page">
    <div class="card">
        <div class="header">
            <h2>Burn Score Timeline</h2>
            <div id="predictionText" class="prediction">
                Insufficient data to predict
            </div>
        </div>

        <div class="controls">
            <input type="number" id="burnInput" min="0" max="100" placeholder="Enter burn score">
            <button id="addBtn">Add</button>
        </div>

        <canvas id="chart"></canvas>
    </div>
</div>

<script src="graph.js"></script>
</body>
</html>
