<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panic Button</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Glow Background */
.glow {
    position: absolute;
    width: 300px;
    height: 300px;
    filter: blur(120px);
    opacity: 0.3;
}

.glow.one { background: #6e8efb; top: 10%; left: 10%; }
.glow.two { background: #ff4e50; bottom: 10%; right: 10%; }

/* Container */
.container {
    position: relative;
    z-index: 2;
    backdrop-filter: blur(20px);
    background: rgba(30, 30, 36, 0.6);
    padding: 40px;
    border-radius: 20px;
    width: 90%;
    max-width: 520px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
}

/* Options */
.options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 20px;
}

.option-btn {
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.05);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.option-btn:hover {
    transform: translateY(-5px);
    background: linear-gradient(45deg, #6e8efb, #4CAF50);
}

/* Result */
.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    background: rgba(0,0,0,0.4);
    display: none;
}

/* Feedback */
.feedback-box {
    margin-top: 15px;
    padding: 15px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    display: none;
}

.feedback-buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
}

.feedback-buttons button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #333;
    color: white;
    cursor: pointer;
}

.feedback-buttons button:hover {
    background: #6e8efb;
}
</style>
</head>

<body>

<div class="glow one"></div>
<div class="glow two"></div>

<div class="container">
    <button onclick="window.location.href='index.html'" style="background: none; border: none; color: #aaa; cursor: pointer; text-align: left; width: 100%; margin-bottom: 10px;">
        ← Back to Dashboard
    </button>
    <h1>🚨 Panic Button</h1>
    <p>Why are you stressed out?</p>

    <div class="options">
        <button class="option-btn" onclick="showTip('screen')">📱 Screen Time</button>
        <button class="option-btn" onclick="showTip('fatigue')">⚡ Fatigue</button>
        <button class="option-btn" onclick="showTip('sleep')">😴 Poor Sleep</button>
        <button class="option-btn" onclick="showTip('work')">📋 Work Pressure</button>
        <button class="option-btn" onclick="showTip('social')">🤝 Social Isolation</button>
        <button class="option-btn" onclick="showTip('overthinking')">🧠 Overthinking</button>
    </div>

    <div id="result" class="result"></div>

    <!-- Feedback Section -->
    <div id="feedback-box" class="feedback-box">
        <p><strong>Optional Weekly Feedback Loop</strong></p>
        <p>Did yesterday’s suggestion help you?</p>

        <div class="feedback-buttons">
            <button onclick="submitFeedback('helpful')">👍 Helpful</button>
            <button onclick="submitFeedback('not_helpful')">👎 Not Helpful</button>
        </div>

        <p id="feedback-response" style="margin-top:10px; color:#aaa;"></p>
    </div>
</div>

<script>
// --- GATEKEEPER ---
// Ensure the user is actually logged in
const activeSession = localStorage.getItem('burnWatch_ActiveSession');
if (!activeSession) {
    window.location.href = 'login.html';
}

function showTip(type) {
    let message = "";

    switch(type) {
        case 'screen':
            message = "📱 Follow 20-20-20 rule and reduce screen exposure.";
            break;
        case 'fatigue':
            message = "⚡ Drink water, stretch, and take a short break.";
            break;
        case 'sleep':
            message = "😴 Avoid screens and get proper rest tonight.";
            break;
        case 'work':
            message = "📋 Break tasks into smaller steps.";
            break;
        case 'social':
            message = "🤝 Talk to someone or go outside.";
            break;
        case 'overthinking':
            message = "🧠 Try deep breathing or journaling.";
            break;
    }

    document.getElementById("result").style.display = "block";
    document.getElementById("result").innerHTML =
        "<strong>💡 Recovery Tip:</strong><br>" + message;

    document.getElementById("feedback-box").style.display = "block";
    
    // Reset the feedback UI in case they click multiple options
    document.querySelector('.feedback-buttons').style.display = 'flex';
    document.getElementById("feedback-response").innerHTML = "";
}

function submitFeedback(type) {
    let response = document.getElementById("feedback-response");

    // 1. Fetch the JSON Database
    let usersDb = JSON.parse(localStorage.getItem('burnWatch_Users')) || [];
    let userIndex = usersDb.findIndex(user => user.username === activeSession);

    if (userIndex !== -1) {
        let currentUser = usersDb[userIndex];

        // 2. Initialize the variable if it doesn't exist yet
        if (!currentUser.recoveryScore) {
            currentUser.recoveryScore = 0;
        }

        // 3. Add or Subtract from the variable
        if (type === "helpful") {
            currentUser.recoveryScore += 1;
            response.innerHTML = "✅ Thanks! Your Recovery Score is now " + currentUser.recoveryScore + ".";
            response.style.color = "#4CAF50"; // Green
        } else {
            currentUser.recoveryScore -= 1;
            response.innerHTML = "⚠️ Noted! Your Recovery Score is now " + currentUser.recoveryScore + ".";
            response.style.color = "#FFC107"; // Yellow
        }

        // 4. Save the updated variable back to the database
        usersDb[userIndex] = currentUser;
        localStorage.setItem('burnWatch_Users', JSON.stringify(usersDb));
    }

    // Hide the buttons so they can't spam the score up or down infinitely
    document.querySelector('.feedback-buttons').style.display = 'none';
}
</script>

</body>
</html>
